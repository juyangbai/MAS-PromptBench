      sees the other peers' previous-round answers and revises its own.
      The final answer is the round-R majority (for discrete outputs)
      or the round-R consensus (for generative outputs).
    benchmarks:
      math:
        debater: "Solves the math problem in round 0 with a boxed answer; in later rounds, compares peers' intermediate steps and either confirms or corrects its own final answer."
